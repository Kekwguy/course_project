<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Панель управления | QuickDash Admin</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Montserrat:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="admin-header">
        <h1><i class="fas fa-crown"></i> QuickDash Admin</h1>
        <p>Панель управления рестораном</p>
    </div>

    <div class="theme-toggle-container">
        <button id="theme-toggle" class="theme-toggle" aria-label="Переключить тему">
            <i class="fas fa-moon"></i>
        </button>
    </div>

    <div class="admin-container">
        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-shopping-cart"></i>
                <h3>156</h3>
                <p>Заказов сегодня</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-users"></i>
                <h3>1,234</h3>
                <p>Всего клиентов</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-hamburger"></i>
                <h3 id="products-count">42</h3>
                <p>Блюд в меню</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-chart-line"></i>
                <h3>₿ 234,567</h3>
                <p>Выручка за сегодня</p>
            </div>
        </div>

        <div class="add-product-section">
            <h2><i class="fas fa-plus-circle"></i> Добавить новый товар</h2>
            <form id="add-product-form" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Название товара</label>
                    <input type="text" id="product-name" placeholder="Например: Супер бургер" required>
                </div>
                <div class="form-group">
                    <label>Цена (₽)</label>
                    <input type="number" id="product-price" placeholder="Например: 349" required>
                </div>
                <div class="form-group">
                    <label>Категория</label>
                    <select id="product-category">
                        <option value="Бургеры">Бургеры</option>
                        <option value="Закуски">Закуски</option>
                        <option value="Напитки">Напитки</option>
                        <option value="Десерты">Десерты</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Изображение товара</label>
                    <div class="file-upload-container">
                        <input type="file" id="product-image" accept="image/*" style="display: none;">
                        <button type="button" class="file-upload-btn"
                            onclick="document.getElementById('product-image').click()">
                            <i class="fas fa-cloud-upload-alt"></i> Выбрать изображение
                        </button>
                        <span id="file-name-display" class="file-name-display">Файл не выбран</span>
                        <div id="image-preview" class="image-preview" style="display: none;">
                            <img id="preview-img" src="#" alt="Предпросмотр">
                            <button type="button" class="remove-image-btn" onclick="removeImage()">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <button type="submit" class="add-product-btn">
                    <i class="fas fa-cart-plus"></i> Добавить товар
                </button>
            </form>
        </div>

        <div class="products-list-section">
            <h2><i class="fas fa-trash-alt"></i> Управление товарами</h2>
            <div id="admin-products-list" class="admin-products-list">
                <!-- товары будут загружены сюда -->
            </div>
        </div>

        <button id="logout-btn" class="logout-btn">
            <i class="fas fa-sign-out-alt"></i> Выйти из системы
        </button>
        <a href="../main/index.html" class="back-site">
            <i class="fas fa-arrow-left"></i> Вернуться на сайт
        </a>
    </div>

<script src="./main.js"></script>
</body>

</html>
