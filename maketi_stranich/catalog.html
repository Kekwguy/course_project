<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Каталог - Wireframe Макет</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #ffffff;
            color: #000000;
            line-height: 1.4;
            transition: background 0.3s;
        }

        /* Wireframe стили - только контуры и линии */
        :root {
            --line-dark: #000000;
            --line-gray: #cccccc;
            --line-light: #eeeeee;
            --bg-wireframe: #ffffff;
        }

        .container {
            max-width: 375px;
            margin: 0 auto;
            padding: 0 16px;
            width: 100%;
        }

        /* шапка */
        .navbar {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            padding: 20px 0 12px;
            position: relative;
        }

        .logo-wireframe {
            width: 140px;
            height: 45px;
            border: 2px solid var(--line-dark);
            border-radius: 12px;
            background: var(--bg-wireframe);
        }

        .theme-toggle-wireframe {
            position: absolute;
            top: 10px;
            right: 5px;
            width: 44px;
            height: 44px;
            border: 2px solid var(--line-dark);
            border-radius: 50%;
            background: var(--bg-wireframe);
        }

        /* поиск */
        .search-container-wireframe {
            display: flex;
            width: 100%;
            max-width: 300px;
            margin: 10px auto;
            position: relative;
        }

        .search-input-wireframe {
            flex: 1;
            height: 48px;
            border: 2px solid var(--line-gray);
            border-radius: 50px;
            background: var(--bg-wireframe);
        }

        .search-button-wireframe {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            border: 2px solid var(--line-gray);
            border-radius: 50%;
            background: var(--bg-wireframe);
        }

        .login-btn-wireframe {
            width: 100px;
            height: 44px;
            border: 2px solid var(--line-dark);
            border-radius: 50px;
            background: var(--bg-wireframe);
            margin: 5px auto;
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            list-style: none;
        }

        .nav-link-wireframe {
            width: 55px;
            height: 20px;
            border-bottom: 2px solid var(--line-dark);
        }

        /* заголовок каталога */
        .catalog-header-wireframe {
            text-align: center;
            margin: 20px 0 30px;
        }

        .catalog-title-wireframe {
            width: 150px;
            height: 32px;
            background: var(--line-dark);
            margin: 0 auto 8px;
        }

        .catalog-subtitle-wireframe {
            width: 180px;
            height: 14px;
            background: var(--line-gray);
            margin: 0 auto;
        }

        /* баннер */
        .promo-banner-wireframe {
            border: 2px solid var(--line-light);
            border-radius: 28px;
            padding: 20px;
            margin: 20px 0 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            background: var(--bg-wireframe);
        }

        .promo-badge-wireframe {
            width: 60px;
            height: 24px;
            border: 1px solid var(--line-gray);
            border-radius: 50px;
            margin-bottom: 10px;
        }

        .promo-title-wireframe {
            width: 100px;
            height: 28px;
            background: var(--line-dark);
            margin-bottom: 5px;
        }

        .promo-text-wireframe {
            width: 130px;
            height: 12px;
            background: var(--line-gray);
            margin-bottom: 15px;
        }

        .promo-btn-wireframe {
            width: 120px;
            height: 36px;
            border: 2px solid var(--line-dark);
            border-radius: 50px;
            background: var(--bg-wireframe);
        }

        .promo-icon-wireframe {
            width: 60px;
            height: 60px;
            border: 2px solid var(--line-dark);
            border-radius: 50%;
            background: var(--bg-wireframe);
            flex-shrink: 0;
        }

        /* сетка товаров */
        .products-grid-wireframe {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }

        .product-card-wireframe {
            border: 2px solid var(--line-light);
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 12px;
            gap: 12px;
            background: var(--bg-wireframe);
        }

        .product-image-wireframe {
            width: 90px;
            height: 90px;
            border: 2px solid var(--line-gray);
            border-radius: 20px;
            background: var(--bg-wireframe);
            flex-shrink: 0;
            position: relative;
        }

        .product-image-lines {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
        }

        .product-image-lines .line {
            height: 6px;
            background: var(--line-gray);
            margin-bottom: 6px;
            border-radius: 2px;
        }

        .product-info-wireframe {
            flex: 1;
        }

        .product-title-wireframe {
            width: 120px;
            height: 16px;
            background: var(--line-dark);
            margin-bottom: 8px;
        }

        .product-price-wireframe {
            width: 60px;
            height: 18px;
            background: var(--line-dark);
        }

        .product-button-wireframe {
            width: 44px;
            height: 44px;
            border: 2px solid var(--line-dark);
            border-radius: 50%;
            background: var(--bg-wireframe);
            flex-shrink: 0;
        }

        /* футер */
        .footer-wireframe {
            text-align: center;
            padding: 32px 16px 40px;
            border-top: 1px solid var(--line-light);
            margin-top: 10px;
        }

        .footer-logo-wireframe {
            width: 120px;
            height: 40px;
            border: 2px solid var(--line-dark);
            border-radius: 12px;
            margin: 0 auto 14px;
            background: var(--bg-wireframe);
        }

        .footer-line-wireframe {
            width: 200px;
            height: 10px;
            background: var(--line-gray);
            margin: 8px auto;
        }

        .footer-line-short-wireframe {
            width: 150px;
            height: 10px;
            background: var(--line-gray);
            margin: 8px auto;
        }

        /* тёмная тема */
        body.dark-theme {
            background: #1a1a1a;
        }

        body.dark-theme .logo-wireframe,
        body.dark-theme .theme-toggle-wireframe,
        body.dark-theme .search-input-wireframe,
        body.dark-theme .search-button-wireframe,
        body.dark-theme .login-btn-wireframe,
        body.dark-theme .promo-banner-wireframe,
        body.dark-theme .promo-btn-wireframe,
        body.dark-theme .product-card-wireframe,
        body.dark-theme .product-image-wireframe,
        body.dark-theme .product-button-wireframe,
        body.dark-theme .footer-logo-wireframe,
        body.dark-theme .promo-icon-wireframe {
            background: #1e1e1e;
            border-color: #444;
        }

        body.dark-theme .catalog-title-wireframe,
        body.dark-theme .product-title-wireframe,
        body.dark-theme .product-price-wireframe,
        body.dark-theme .promo-title-wireframe,
        body.dark-theme .nav-link-wireframe {
            background: #f0f0f0;
        }

        body.dark-theme .catalog-subtitle-wireframe,
        body.dark-theme .promo-text-wireframe,
        body.dark-theme .footer-line-wireframe,
        body.dark-theme .footer-line-short-wireframe,
        body.dark-theme .product-image-lines .line {
            background: #888;
        }

        body.dark-theme .promo-badge-wireframe {
            border-color: #888;
        }

        @media (max-width: 380px) {
            .container {
                padding: 0 14px;
            }
            .nav-links {
                gap: 12px;
            }
            .nav-link-wireframe {
                width: 45px;
            }
            .product-image-wireframe {
                width: 75px;
                height: 75px;
            }
            .product-button-wireframe {
                width: 38px;
                height: 38px;
            }
            .login-btn-wireframe {
                width: 80px;
                height: 38px;
            }
            .promo-title-wireframe {
                width: 80px;
                height: 24px;
            }
            .promo-icon-wireframe {
                width: 50px;
                height: 50px;
            }
            .promo-btn-wireframe {
                width: 100px;
                height: 32px;
            }
        }
    </style>
</head>
<body>

            <div class="navbar">

                <div class="search-container-wireframe">
                    <div class="search-input-wireframe"></div>
                    <div class="search-button-wireframe"></div>

                <div class="login-btn-wireframe"></div>

                <ul class="nav-links">

                    <div class="product-info-wireframe">

                    </div>
                    <div class="product-info-wireframe">
                        <div class="product-title-wireframe"></div>

                <div class="product-card-wireframe">

                <!-- товар 6 -->
                <div class="product-card-wireframe">

    <footer class="footer-wireframe">
        <div class="container">
            <div class="footer-logo-wireframe"></div>
            <div class="footer-line-wireframe"></div>
            <div class="footer-line-short-wireframe"></div>
        </div>
    </footer>

    <script>
        // переключение темы для wireframe
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;

        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-theme');
        }

        if (themeToggle) {
            themeToggle.addEventListener('click', () => {
                body.classList.toggle('dark-theme');
                localStorage.setItem('theme', body.classList.contains('dark-theme') ? 'dark' : 'light');
            });
        }
    </script>

</html>
