<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Админ-панель - Wireframe Макет</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Wireframe стили - только контуры и линии */
        :root {
            --line-dark: #000000;
            --line-gray: #cccccc;
            --line-light: #eeeeee;
            --bg-wireframe: #ffffff;
        }

        .login-container-wireframe {
            max-width: 400px;
            width: 100%;
            border: 2px solid var(--line-light);
            border-radius: 48px;
            padding: 40px 32px;
            background: var(--bg-wireframe);
            position: relative;
        }

        /* кнопка переключения темы */
        .theme-toggle-wireframe {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border: 2px solid var(--line-dark);
            border-radius: 50%;
            background: var(--bg-wireframe);
        }

        /* логотип */
        .logo-wireframe {
            width: 160px;
            height: 50px;
            border: 2px solid var(--line-dark);
            border-radius: 12px;
            margin: 0 auto 24px;
            background: var(--bg-wireframe);
        }

        /* заголовок */
        .title-wireframe {
            width: 180px;
            height: 32px;
            background: var(--line-dark);
            margin: 0 auto 8px;
        }

        /* подзаголовок */
        .subtitle-wireframe {
            width: 220px;
            height: 16px;
            background: var(--line-gray);
            margin: 0 auto 32px;
        }

        /* сообщение об ошибке */
        .error-message-wireframe {
            width: 100%;
            height: 48px;
            border: 1px solid var(--line-gray);
            border-radius: 28px;
            margin-bottom: 20px;
            display: none;
        }

        /* поля ввода */
        .input-group-wireframe {
            margin-bottom: 20px;
        }

        .input-label-wireframe {
            width: 50px;
            height: 14px;
            background: var(--line-dark);
            margin-bottom: 8px;
        }

        .input-field-wireframe {
            width: 100%;
            height: 52px;
            border: 2px solid var(--line-gray);
            border-radius: 28px;
            background: var(--bg-wireframe);
        }

        /* кнопка входа */
        .login-btn-wireframe {
            width: 100%;
            height: 52px;
            border: 2px solid var(--line-dark);
            border-radius: 50px;
            background: var(--bg-wireframe);
            margin-top: 10px;
            margin-bottom: 20px;
        }

        /* ссылка назад */
        .back-link-wireframe {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
        }

        .back-arrow-wireframe {
            width: 16px;
            height: 16px;
            border: 2px solid var(--line-dark);
            border-top: none;
            border-right: none;
            transform: rotate(45deg);
        }

        .back-text-wireframe {
            width: 120px;
            height: 14px;
            background: var(--line-dark);
        }

        /* демо-данные */
        .demo-wireframe {
            border: 2px solid var(--line-light);
            border-radius: 28px;
            padding: 16px;
            background: var(--bg-wireframe);
        }

        .demo-title-wireframe {
            width: 120px;
            height: 14px;
            background: var(--line-dark);
            margin: 0 auto 12px;
        }

        .demo-line {
            width: 100px;
            height: 12px;
            background: var(--line-gray);
            margin: 8px auto;
        }

        .demo-line.short {
            width: 80px;
        }

        /* тёмная тема для wireframe (опционально) */
        body.dark-theme {
            background: #1a1a1a;
        }

        body.dark-theme .login-container-wireframe {
            background: #1e1e1e;
            border-color: #444;
        }

        body.dark-theme .title-wireframe {
            background: #f0f0f0;
        }

        body.dark-theme .subtitle-wireframe {
            background: #888;
        }

        body.dark-theme .input-label-wireframe {
            background: #f0f0f0;
        }

        body.dark-theme .input-field-wireframe {
            border-color: #555;
        }

        body.dark-theme .login-btn-wireframe {
            border-color: #f0f0f0;
        }

        body.dark-theme .back-text-wireframe {
            background: #f0f0f0;
        }

        body.dark-theme .back-arrow-wireframe {
            border-color: #f0f0f0;
        }

        body.dark-theme .demo-wireframe {
            border-color: #444;
        }

        body.dark-theme .demo-title-wireframe {
            background: #f0f0f0;
        }

        body.dark-theme .demo-line {
            background: #888;
        }

        body.dark-theme .theme-toggle-wireframe {
            border-color: #f0f0f0;
        }

        body.dark-theme .logo-wireframe {
            border-color: #f0f0f0;
        }

        @media (max-width: 480px) {
            .login-container-wireframe {
                padding: 32px 24px;
            }
            .logo-wireframe {
                width: 130px;
                height: 45px;
            }
            .title-wireframe {
                width: 150px;
                height: 28px;
            }
            .subtitle-wireframe {
                width: 180px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container-wireframe">
        <div class="theme-toggle-wireframe"></div>
        
        <div class="logo-wireframe"></div>
        
        <div class="title-wireframe"></div>
        <div class="subtitle-wireframe"></div>
        
        <div id="error-message" class="error-message-wireframe"></div>
        
        <form id="login-form">
            <div class="input-group-wireframe">
                <div class="input-label-wireframe"></div>
                <div class="input-field-wireframe"></div>
            </div>
            <div class="input-group-wireframe">
                <div class="input-label-wireframe"></div>
                <div class="input-field-wireframe"></div>
            </div>
            <div class="login-btn-wireframe"></div>
        </form>
        
        <div class="back-link-wireframe">
            <div class="back-arrow-wireframe"></div>
            <div class="back-text-wireframe"></div>
        </div>
        
        <div class="demo-wireframe">
            <div class="demo-title-wireframe"></div>
            <div class="demo-line"></div>
            <div class="demo-line short"></div>
        </div>
    </div>

    <script>
        // переключение темы для wireframe (опционально)
        const themeToggle = document.querySelector('.theme-toggle-wireframe');
        const body = document.body;

        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-theme');
        }

        if (themeToggle) {
            themeToggle.addEventListener('click', () => {
                body.classList.toggle('dark-theme');
                localStorage.setItem('theme', body.classList.contains('dark-theme') ? 'dark' : 'light');
            });
        }

        // имитация отправки формы (только для демонстрации, без реальной валидации)
        const loginBtn = document.querySelector('.login-btn-wireframe');
        const errorMsg = document.getElementById('error-message');
        
        if (loginBtn) {
            loginBtn.addEventListener('click', (e) => {
                e.preventDefault();
                // показываем "ошибку" для демонстрации макета
                errorMsg.style.display = 'block';
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 2000);
            });
        }
    </script>
</body>
</html>
