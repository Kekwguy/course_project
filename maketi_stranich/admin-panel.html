<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Админ-панель - Wireframe Макет</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #ffffff;
            transition: background 0.3s;
            position: relative;
        }

        /* Wireframe стили - только контуры и линии */
        :root {
            --line-dark: #000000;
            --line-gray: #cccccc;
            --line-light: #eeeeee;
            --bg-wireframe: #ffffff;
        }

        /* хедер */
        .admin-header-wireframe {
            border-bottom: 2px solid var(--line-light);
            padding: 30px 20px;
            text-align: center;
        }

        .header-title-wireframe {
            width: 220px;
            height: 32px;
            background: var(--line-dark);
            margin: 0 auto 8px;
        }

        .header-subtitle-wireframe {
            width: 180px;
            height: 14px;
            background: var(--line-gray);
            margin: 0 auto;
        }

        /* кнопка переключения темы */
        .theme-toggle-container-wireframe {
            display: flex;
            justify-content: flex-end;
            max-width: 900px;
            margin: 15px auto 0;
            padding: 0 20px;
        }

        .theme-toggle-wireframe {
            width: 44px;
            height: 44px;
            border: 2px solid var(--line-dark);
            border-radius: 50%;
            background: var(--bg-wireframe);
        }

        /* основной контейнер */
        .admin-container-wireframe {
            max-width: 900px;
            margin: 20px auto 40px;
            padding: 0 20px;
        }

        /* сетка статистики */
        .stats-grid-wireframe {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card-wireframe {
            border: 2px solid var(--line-light);
            border-radius: 28px;
            padding: 24px;
            text-align: center;
            background: var(--bg-wireframe);
        }

        .stat-icon-wireframe {
            width: 48px;
            height: 48px;
            border: 2px solid var(--line-dark);
            border-radius: 16px;
            margin: 0 auto 12px;
        }

        .stat-number-wireframe {
            width: 80px;
            height: 32px;
            background: var(--line-dark);
            margin: 0 auto 8px;
        }

        .stat-label-wireframe {
            width: 100px;
            height: 14px;
            background: var(--line-gray);
            margin: 0 auto;
        }

        /* секция добавления товара */
        .add-product-section-wireframe {
            border: 2px solid var(--line-light);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 40px;
            background: var(--bg-wireframe);
        }

        .section-title-wireframe {
            width: 200px;
            height: 28px;
            background: var(--line-dark);
            margin-bottom: 20px;
        }

        .form-group-wireframe {
            margin-bottom: 15px;
        }

        .form-label-wireframe {
            width: 120px;
            height: 12px;
            background: var(--line-dark);
            margin-bottom: 8px;
        }

        .form-input-wireframe {
            width: 100%;
            height: 48px;
            border: 2px solid var(--line-gray);
            border-radius: 28px;
            background: var(--bg-wireframe);
        }

        .file-upload-wireframe {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .file-upload-btn-wireframe {
            width: 100%;
            height: 48px;
            border: 2px solid var(--line-dark);
            border-radius: 50px;
            background: var(--bg-wireframe);
        }

        .file-name-wireframe {
            width: 120px;
            height: 12px;
            background: var(--line-gray);
            margin: 0 auto;
        }

        .image-preview-wireframe {
            width: 100%;
            height: 100px;
            border: 2px solid var(--line-gray);
            border-radius: 16px;
            margin-top: 10px;
            position: relative;
        }

        .add-product-btn-wireframe {
            width: 100%;
            height: 48px;
            border: 2px solid var(--line-dark);
            border-radius: 50px;
            background: var(--bg-wireframe);
            margin-top: 10px;
        }

        /* секция управления товарами */
        .products-list-section-wireframe {
            border: 2px solid var(--line-light);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 40px;
            background: var(--bg-wireframe);
        }

        .products-list-wireframe {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
        }

        .product-item-wireframe {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border: 1px solid var(--line-light);
            border-radius: 20px;
        }

        .product-info-wireframe {
            flex: 1;
        }

        .product-name-wireframe {
            width: 120px;
            height: 16px;
            background: var(--line-dark);
            margin-bottom: 6px;
        }

        .product-price-wireframe {
            width: 80px;
            height: 12px;
            background: var(--line-gray);
        }

        .delete-btn-wireframe {
            width: 36px;
            height: 36px;
            border: 2px solid var(--line-dark);
            border-radius: 50%;
            background: var(--bg-wireframe);
        }

        .empty-message-wireframe {
            text-align: center;
            padding: 30px;
        }

        .empty-icon-wireframe {
            width: 48px;
            height: 48px;
            border: 2px solid var(--line-gray);
            border-radius: 50%;
            margin: 0 auto 12px;
        }

        .empty-text-wireframe {
            width: 150px;
            height: 12px;
            background: var(--line-gray);
            margin: 0 auto;
        }

        /* кнопка выхода */
        .logout-btn-wireframe {
            width: 100%;
            height: 52px;
            border: 2px solid var(--line-dark);
            border-radius: 50px;
            background: var(--bg-wireframe);
            margin-bottom: 20px;
        }

        /* ссылка назад */
        .back-site-wireframe {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .back-arrow-wireframe {
            width: 16px;
            height: 16px;
            border: 2px solid var(--line-dark);
            border-top: none;
            border-right: none;
            transform: rotate(45deg);
        }

        .back-text-wireframe {
            width: 140px;
            height: 14px;
            background: var(--line-dark);
        }

        /* тёмная тема для wireframe */
        body.dark-theme {
            background: #1a1a1a;
        }

        body.dark-theme .admin-header-wireframe {
            border-bottom-color: #444;
        }

        body.dark-theme .header-title-wireframe {
            background: #f0f0f0;
        }

        body.dark-theme .header-subtitle-wireframe {
            background: #888;
        }

        body.dark-theme .theme-toggle-wireframe {
            border-color: #f0f0f0;
        }

        body.dark-theme .stat-card-wireframe {
            border-color: #444;
        }

        body.dark-theme .stat-icon-wireframe {
            border-color: #f0f0f0;
        }

        body.dark-theme .stat-number-wireframe {
            background: #f0f0f0;
        }

        body.dark-theme .stat-label-wireframe {
            background: #888;
        }

        body.dark-theme .add-product-section-wireframe {
            border-color: #444;
        }

        body.dark-theme .section-title-wireframe {
            background: #f0f0f0;
        }

        body.dark-theme .form-label-wireframe {
            background: #f0f0f0;
        }

        body.dark-theme .form-input-wireframe {
            border-color: #555;
        }

        body.dark-theme .file-upload-btn-wireframe {
            border-color: #f0f0f0;
        }

        body.dark-theme .file-name-wireframe {
            background: #888;
        }

        body.dark-theme .image-preview-wireframe {
            border-color: #555;
        }

        body.dark-theme .add-product-btn-wireframe {
            border-color: #f0f0f0;
        }

        body.dark-theme .products-list-section-wireframe {
            border-color: #444;
        }

        body.dark-theme .product-item-wireframe {
            border-color: #444;
        }

        body.dark-theme .product-name-wireframe {
            background: #f0f0f0;
        }

        body.dark-theme .product-price-wireframe {
            background: #888;
        }

        body.dark-theme .delete-btn-wireframe {
            border-color: #f0f0f0;
        }

        body.dark-theme .logout-btn-wireframe {
            border-color: #f0f0f0;
        }

        body.dark-theme .back-arrow-wireframe {
            border-color: #f0f0f0;
        }

        body.dark-theme .back-text-wireframe {
            background: #f0f0f0;
        }

        @media (max-width: 480px) {
            .stats-grid-wireframe {
                grid-template-columns: 1fr;
            }
            .header-title-wireframe {
                width: 180px;
                height: 28px;
            }
            .header-subtitle-wireframe {
                width: 150px;
            }
            .section-title-wireframe {
                width: 170px;
            }
        }
    </style>
</head>
<body>
    <!-- хедер -->
    <div class="admin-header-wireframe">
        <div class="header-title-wireframe"></div>
        <div class="header-subtitle-wireframe"></div>
    </div>

    <!-- кнопка переключения темы -->
    <div class="theme-toggle-container-wireframe">
        <div class="theme-toggle-wireframe" id="theme-toggle"></div>
    </div>

    <!-- основной контент -->
    <div class="admin-container-wireframe">
        <!-- сетка статистики -->
        <div class="stats-grid-wireframe">
            <div class="stat-card-wireframe">
                <div class="stat-icon-wireframe"></div>
                <div class="stat-number-wireframe"></div>
                <div class="stat-label-wireframe"></div>
            </div>
            <div class="stat-card-wireframe">
                <div class="stat-icon-wireframe"></div>
                <div class="stat-number-wireframe"></div>
                <div class="stat-label-wireframe"></div>
            </div>
            <div class="stat-card-wireframe">
                <div class="stat-icon-wireframe"></div>
                <div class="stat-number-wireframe"></div>
                <div class="stat-label-wireframe"></div>
            </div>
            <div class="stat-card-wireframe">
                <div class="stat-icon-wireframe"></div>
                <div class="stat-number-wireframe"></div>
                <div class="stat-label-wireframe"></div>
            </div>
        </div>

        <!-- секция добавления товара -->
        <div class="add-product-section-wireframe">
            <div class="section-title-wireframe"></div>
            
            <div class="form-group-wireframe">
                <div class="form-label-wireframe"></div>
                <div class="form-input-wireframe"></div>
            </div>
            <div class="form-group-wireframe">
                <div class="form-label-wireframe"></div>
                <div class="form-input-wireframe"></div>
            </div>
            <div class="form-group-wireframe">
                <div class="form-label-wireframe"></div>
                <div class="form-input-wireframe"></div>
            </div>
            <div class="form-group-wireframe">
                <div class="form-label-wireframe"></div>
                <div class="file-upload-wireframe">
                    <div class="file-upload-btn-wireframe"></div>
                    <div class="file-name-wireframe"></div>
                    <div class="image-preview-wireframe"></div>
                </div>
            </div>
            <div class="add-product-btn-wireframe"></div>
        </div>

        <!-- секция управления товарами -->
        <div class="products-list-section-wireframe">
            <div class="section-title-wireframe"></div>
            <div class="products-list-wireframe" id="products-list">
                <div class="product-item-wireframe">
                    <div class="product-info-wireframe">
                        <div class="product-name-wireframe"></div>
                        <div class="product-price-wireframe"></div>
                    </div>
                    <div class="delete-btn-wireframe"></div>
                </div>
                <div class="product-item-wireframe">
                    <div class="product-info-wireframe">
                        <div class="product-name-wireframe"></div>
                        <div class="product-price-wireframe"></div>
                    </div>
                    <div class="delete-btn-wireframe"></div>
                </div>
                <div class="product-item-wireframe">
                    <div class="product-info-wireframe">
                        <div class="product-name-wireframe"></div>
                        <div class="product-price-wireframe"></div>
                    </div>
                    <div class="delete-btn-wireframe"></div>
                </div>
            </div>
        </div>

        <!-- кнопка выхода -->
        <div class="logout-btn-wireframe" id="logout-btn"></div>
        
        <!-- ссылка назад -->
        <div class="back-site-wireframe">
            <div class="back-arrow-wireframe"></div>
            <div class="back-text-wireframe"></div>
        </div>
    </div>

    <script>
        // переключение темы для wireframe
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;

        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-theme');
        }

        if (themeToggle) {
            themeToggle.addEventListener('click', () => {
                body.classList.toggle('dark-theme');
                localStorage.setItem('theme', body.classList.contains('dark-theme') ? 'dark' : 'light');
            });
        }

        // имитация выхода (для демонстрации макета)
        const logoutBtn = document.getElementById('logout-btn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                alert('🚪 Wireframe: Выход из системы (демо-режим)');
            });
        }
    </script>
</body>
</html>
