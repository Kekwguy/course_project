<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Оплата заказа - Wireframe Макет</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Wireframe стили - только контуры и линии */
        :root {
            --line-dark: #000000;
            --line-gray: #cccccc;
            --line-light: #eeeeee;
            --bg-wireframe: #ffffff;
        }

        .payment-container-wireframe {
            max-width: 400px;
            margin: 0 auto;
            background: var(--bg-wireframe);
            border: 2px solid var(--line-light);
            border-radius: 48px;
            padding: 40px 24px;
            position: relative;
            width: 100%;
        }

        /* кнопка переключения темы */
        .theme-toggle-wireframe {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border: 2px solid var(--line-dark);
            border-radius: 50%;
            background: var(--bg-wireframe);
        }

        /* логотип */
        .logo-wireframe {
            width: 140px;
            height: 45px;
            border: 2px solid var(--line-dark);
            border-radius: 12px;
            margin-bottom: 20px;
            background: var(--bg-wireframe);
        }

        /* ссылка назад */
        .back-link-wireframe {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
        }

        .back-arrow-wireframe {
            width: 16px;
            height: 16px;
            border: 2px solid var(--line-dark);
            border-top: none;
            border-right: none;
            transform: rotate(45deg);
        }

        .back-text-wireframe {
            width: 120px;
            height: 14px;
            background: var(--line-dark);
        }

        /* заголовок */
        .title-wireframe {
            width: 200px;
            height: 32px;
            background: var(--line-dark);
            margin-bottom: 8px;
        }

        /* подзаголовок */
        .subtitle-wireframe {
            width: 220px;
            height: 14px;
            background: var(--line-gray);
            margin-bottom: 24px;
        }

        /* сводка заказа */
        .order-summary-wireframe {
            border: 2px solid var(--line-light);
            border-radius: 28px;
            padding: 20px;
            margin: 24px 0;
            background: var(--bg-wireframe);
        }

        .order-item-wireframe {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .order-item-name-wireframe {
            width: 120px;
            height: 16px;
            background: var(--line-dark);
        }

        .order-item-price-wireframe {
            width: 60px;
            height: 16px;
            background: var(--line-gray);
        }

        .order-total-wireframe {
            display: flex;
            justify-content: space-between;
            padding-top: 16px;
            border-top: 2px solid var(--line-light);
        }

        .order-total-label-wireframe {
            width: 50px;
            height: 18px;
            background: var(--line-dark);
        }

        .order-total-price-wireframe {
            width: 70px;
            height: 18px;
            background: var(--line-dark);
        }

        /* форма */
        .form-wireframe {
            margin-top: 24px;
        }

        .input-field-wireframe {
            width: 100%;
            height: 52px;
            border: 2px solid var(--line-gray);
            border-radius: 28px;
            background: var(--bg-wireframe);
            margin-bottom: 16px;
        }

        .pay-btn-wireframe {
            width: 100%;
            height: 56px;
            border: 2px solid var(--line-dark);
            border-radius: 50px;
            background: var(--bg-wireframe);
            margin-top: 10px;
        }

        /* тёмная тема для wireframe (опционально) */
        body.dark-theme {
            background: #1a1a1a;
        }

        body.dark-theme .payment-container-wireframe {
            background: #1e1e1e;
            border-color: #444;
        }

        body.dark-theme .title-wireframe {
            background: #f0f0f0;
        }

        body.dark-theme .subtitle-wireframe {
            background: #888;
        }

        body.dark-theme .order-summary-wireframe {
            border-color: #444;
        }

        body.dark-theme .order-item-name-wireframe {
            background: #f0f0f0;
        }

        body.dark-theme .order-item-price-wireframe {
            background: #888;
        }

        body.dark-theme .order-total-wireframe {
            border-top-color: #444;
        }

        body.dark-theme .order-total-label-wireframe {
            background: #f0f0f0;
        }

        body.dark-theme .order-total-price-wireframe {
            background: #f0f0f0;
        }

        body.dark-theme .input-field-wireframe {
            border-color: #555;
        }

        body.dark-theme .pay-btn-wireframe {
            border-color: #f0f0f0;
        }

        body.dark-theme .back-text-wireframe {
            background: #f0f0f0;
        }

        body.dark-theme .back-arrow-wireframe {
            border-color: #f0f0f0;
        }

        body.dark-theme .logo-wireframe {
            border-color: #f0f0f0;
        }

        body.dark-theme .theme-toggle-wireframe {
            border-color: #f0f0f0;
        }

        @media (max-width: 480px) {
            .payment-container-wireframe {
                padding: 30px 20px;
            }
            .logo-wireframe {
                width: 120px;
                height: 40px;
            }
            .title-wireframe {
                width: 170px;
                height: 28px;
            }
            .subtitle-wireframe {
                width: 190px;
            }
            .order-item-name-wireframe {
                width: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="payment-container-wireframe">
        <div class="theme-toggle-wireframe"></div>
        
        <div class="logo-wireframe"></div>
        
        <div class="back-link-wireframe">
            <div class="back-arrow-wireframe"></div>
            <div class="back-text-wireframe"></div>
        </div>
        
        <div class="title-wireframe"></div>
        <div class="subtitle-wireframe"></div>
        
        <div class="order-summary-wireframe">
            <div class="order-item-wireframe">
                <div class="order-item-name-wireframe"></div>
                <div class="order-item-price-wireframe"></div>
            </div>
            <div class="order-total-wireframe">
                <div class="order-total-label-wireframe"></div>
                <div class="order-total-price-wireframe"></div>
            </div>
        </div>
        
        <div class="form-wireframe">
            <div class="input-field-wireframe"></div>
            <div class="input-field-wireframe"></div>
            <div class="input-field-wireframe"></div>
            <div class="pay-btn-wireframe"></div>
        </div>
    </div>

    <script>
        // переключение темы для wireframe (опционально)
        const themeToggle = document.querySelector('.theme-toggle-wireframe');
        const body = document.body;

        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-theme');
        }

        if (themeToggle) {
            themeToggle.addEventListener('click', () => {
                body.classList.toggle('dark-theme');
                localStorage.setItem('theme', body.classList.contains('dark-theme') ? 'dark' : 'light');
            });
        }

        // имитация отправки формы (для демонстрации макета)
        const payBtn = document.querySelector('.pay-btn-wireframe');
        
        if (payBtn) {
            payBtn.addEventListener('click', (e) => {
                e.preventDefault();
                alert('🧾 Wireframe: Демо-оплата заказа');
            });
        }
    </script>
</body>
</html>
