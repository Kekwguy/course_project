<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>QuickDash - Wireframe Макет</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #ffffff;
            color: #000000;
            line-height: 1.4;
        }

        /* Wireframe стили - только контуры и линии */
        :root {
            --line-dark: #000000;
            --line-gray: #cccccc;
            --line-light: #eeeeee;
            --bg-wireframe: #ffffff;
        }

        .container {
            max-width: 375px;
            margin: 0 auto;
            padding: 0 16px;
            width: 100%;
        }

        .section {
            padding: 56px 0 40px;
            position: relative;
            border-bottom: 1px solid var(--line-light);
        }

        /* линия-заголовок */
        .title-line {
            width: 180px;
            height: 32px;
            background: var(--line-dark);
            margin-bottom: 18px;
        }

        .title-line.short {
            width: 120px;
            height: 32px;
        }

        .title-line.medium {
            width: 150px;
            height: 32px;
        }

        /* линия-подзаголовок */
        .subtitle-line {
            width: 200px;
            height: 16px;
            background: var(--line-gray);
            margin-bottom: 20px;
        }

        /* линии текста */
        .text-line {
            height: 12px;
            background: var(--line-gray);
            margin-bottom: 8px;
            border-radius: 2px;
        }

        .text-line.full {
            width: 100%;
        }

        .text-line.long {
            width: 90%;
        }

        .text-line.medium {
            width: 70%;
        }

        .text-line.short {
            width: 50%;
        }

        .text-block {
            margin-bottom: 16px;
        }

        /* линия-разделитель */
        .divider-line {
            width: 55px;
            height: 4px;
            background: var(--line-dark);
            margin-bottom: 24px;
        }

        /* кнопка-плейсхолдер */
        .btn-wireframe {
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 2px solid var(--line-dark);
            padding: 14px 24px;
            border-radius: 50px;
            width: 100%;
            height: 52px;
        }

        /* шапка */
        .navbar {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            padding: 20px 0 12px;
            position: relative;
        }

        .logo-wireframe {
            width: 140px;
            height: 50px;
            border: 2px solid var(--line-dark);
            border-radius: 12px;
            background: var(--bg-wireframe);
        }

        .search-wireframe {
            display: flex;
            width: 100%;
            max-width: 300px;
            margin: 10px auto;
            position: relative;
        }

        .search-input-wireframe {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--line-gray);
            border-radius: 50px;
            background: var(--bg-wireframe);
            height: 48px;
        }

        .search-button-wireframe {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            border: 2px solid var(--line-gray);
            border-radius: 50%;
            background: var(--bg-wireframe);
        }

        .login-btn-wireframe {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 2px solid var(--line-dark);
            padding: 10px 20px;
            border-radius: 50px;
            width: auto;
            min-width: 100px;
            margin: 5px auto;
            height: 44px;
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            list-style: none;
        }

        .nav-link-wireframe {
            width: 60px;
            height: 24px;
            border-bottom: 2px solid var(--line-dark);
        }

        .theme-toggle-wireframe {
            position: absolute;
            top: 10px;
            right: 5px;
            width: 44px;
            height: 44px;
            border: 2px solid var(--line-dark);
            border-radius: 50%;
            background: var(--bg-wireframe);
        }

        /* hero секция */
        .hero {
            border: 2px solid var(--line-light);
            border-radius: 32px;
            margin: 12px 0 24px;
            background: var(--bg-wireframe);
        }

        .hero-grid {
            display: flex;
            flex-direction: column;
            gap: 24px;
            padding: 32px 20px 28px;
        }

        .hero-badge-wireframe {
            width: 100px;
            height: 28px;
            border: 1px solid var(--line-gray);
            border-radius: 40px;
            margin-bottom: 20px;
        }

        .hero-title-wireframe {
            width: 100%;
            height: 48px;
            background: var(--line-dark);
            margin-bottom: 16px;
        }

        .hero-subtitle-wireframe {
            width: 85%;
            height: 28px;
            background: var(--line-dark);
            margin-bottom: 16px;
        }

        .video-wireframe {
            width: 100%;
            min-height: 220px;
            border: 2px solid var(--line-gray);
            border-radius: 28px;
            background: var(--bg-wireframe);
            position: relative;
        }

        /* линии внутри видео */
        .video-lines {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
        }

        .video-lines .text-line {
            background: var(--line-gray);
            margin-bottom: 8px;
        }

        /* карточки преимуществ */
        .features-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 32px;
        }

        .feature-card-wireframe {
            border: 2px solid var(--line-light);
            border-radius: 28px;
            padding: 24px 20px;
            background: var(--bg-wireframe);
        }

        .feature-icon-wireframe {
            width: 48px;
            height: 48px;
            border: 2px solid var(--line-dark);
            border-radius: 16px;
            margin-bottom: 16px;
        }

        /* Swiper стили */
        .team-swiper {
            margin-top: 32px;
            overflow: visible;
            padding: 10px 0;
            padding-left: 16px;
            padding-right: 16px;
        }

        .team-swiper .swiper-slide {
            width: 280px;
            height: auto;
            display: flex;
            justify-content: center;
        }

        .team-member-wireframe {
            text-align: center;
            border: 2px solid var(--line-light);
            border-radius: 32px;
            padding: 28px 16px 24px;
            background: var(--bg-wireframe);
            height: 100%;
            width: 100%;
        }

        .member-photo-wireframe {
            width: 120px;
            height: 120px;
            border: 2px solid var(--line-dark);
            border-radius: 50%;
            margin: 0 auto 16px;
            background: var(--bg-wireframe);
            position: relative;
        }

        /* линии внутри фото */
        .photo-lines {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60%;
        }

        .photo-lines .text-line {
            background: var(--line-gray);
            margin-bottom: 6px;
        }

        .member-name-line {
            width: 120px;
            height: 20px;
            background: var(--line-dark);
            margin: 0 auto 8px;
        }

        .member-role-line {
            width: 80px;
            height: 14px;
            background: var(--line-gray);
            margin: 0 auto 10px;
        }

        /* Swiper navigation */
        .swiper-button-prev,
        .swiper-button-next {
            width: 40px;
            height: 40px;
            border: 2px solid var(--line-dark);
            border-radius: 50%;
            background: var(--bg-wireframe);
        }

        .swiper-button-prev:after,
        .swiper-button-next:after {
            font-size: 0;
        }

        .swiper-pagination-bullet {
            width: 8px;
            height: 8px;
            background: var(--line-gray);
            opacity: 1;
        }

        .swiper-pagination-bullet-active {
            background: var(--line-dark);
        }

        /* контакты */
        .contact-wireframe {
            border: 2px solid var(--line-light);
            border-radius: 40px;
            margin-top: 20px;
            padding: 40px 24px;
            background: var(--bg-wireframe);
        }

        .info-item-wireframe {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 28px;
        }

        .info-icon-wireframe {
            width: 48px;
            height: 48px;
            border: 2px solid var(--line-dark);
            border-radius: 30px;
            background: var(--bg-wireframe);
        }

        .info-content-wireframe {
            flex: 1;
        }

        .info-label-wireframe {
            width: 60px;
            height: 12px;
            background: var(--line-gray);
            margin-bottom: 8px;
        }

        .info-value-wireframe {
            width: 150px;
            height: 18px;
            background: var(--line-dark);
        }

        /* форма */
        .form-wireframe input,
        .form-wireframe textarea {
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 18px;
            border: 2px solid var(--line-gray);
            border-radius: 28px;
            background: var(--bg-wireframe);
            height: 52px;
        }

        .form-wireframe textarea {
            height: 100px;
        }

        /* карта-плейсхолдер */
        .map-wireframe {
            width: 100%;
            height: 250px;
            border: 2px solid var(--line-gray);
            border-radius: 28px;
            background: var(--bg-wireframe);
            margin-top: 32px;
            position: relative;
        }

        .map-lines {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
        }

        /* футер */
        .footer {
            text-align: center;
            padding: 32px 16px 40px;
            border-top: 1px solid var(--line-light);
            margin-top: 10px;
        }

        .footer-logo-wireframe {
            width: 120px;
            height: 40px;
            border: 2px solid var(--line-dark);
            border-radius: 8px;
            margin: 0 auto 14px;
            background: var(--bg-wireframe);
        }

        .footer-line {
            width: 200px;
            height: 12px;
            background: var(--line-gray);
            margin: 8px auto;
        }

        /* якорная кнопка */
        .scroll-to-top-wireframe {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border: 2px solid var(--line-dark);
            border-radius: 50%;
            background: var(--bg-wireframe);
        }

        @media (max-width: 380px) {
            .container {
                padding: 0 14px;
            }
            .team-swiper .swiper-slide {
                width: 260px;
            }
            .swiper-button-prev,
            .swiper-button-next {
                width: 32px;
                height: 32px;
            }
        }

        /* отключаем hover эффекты */
        .btn-wireframe, .login-btn-wireframe, .nav-link-wireframe {
            cursor: default;
        }
    </style>
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
</head>
<body>
    <header>
        <div class="container">
            <div class="navbar">
                <div class="logo-wireframe"></div>
                <div class="theme-toggle-wireframe"></div>

                <div class="search-wireframe">
                    <div class="search-input-wireframe"></div>
                    <div class="search-button-wireframe"></div>
                </div>

                <div class="login-btn-wireframe"></div>

                <ul class="nav-links">
                    <li><div class="nav-link-wireframe"></div></li>
                    <li><div class="nav-link-wireframe"></div></li>
                    <li><div class="nav-link-wireframe"></div></li>
                    <li><div class="nav-link-wireframe"></div></li>
                    <li><div class="nav-link-wireframe"></div></li>
                    <li><div class="nav-link-wireframe"></div></li>
                </ul>
            </div>
        </div>
    </header>

    <main>
        <!-- hero секция -->
        <section class="container">
            <div class="hero">
                <div class="hero-grid">
                    <div class="hero-content">
                        <div class="hero-badge-wireframe"></div>
                        <div class="hero-title-wireframe"></div>
                        <div class="hero-subtitle-wireframe"></div>
                        <div class="text-block">
                            <div class="text-line full"></div>
                            <div class="text-line long"></div>
                            <div class="text-line medium"></div>
                        </div>
                        <div class="btn-wireframe"></div>
                    </div>
                    <div class="video-wireframe">
                        <div class="video-lines">
                            <div class="text-line full"></div>
                            <div class="text-line long"></div>
                            <div class="text-line medium"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- секция "о нас" -->
        <section class="section">
            <div class="container">
                <div class="title-line"></div>
                <div class="divider-line"></div>
                <div class="subtitle-line"></div>
                <div class="features-grid">
                    <div class="feature-card-wireframe">
                        <div class="feature-icon-wireframe"></div>
                        <div class="title-line short" style="margin-bottom: 12px;"></div>
                        <div class="text-line full"></div>
                        <div class="text-line medium"></div>
                    </div>
                    <div class="feature-card-wireframe">
                        <div class="feature-icon-wireframe"></div>
                        <div class="title-line short" style="margin-bottom: 12px;"></div>
                        <div class="text-line full"></div>
                        <div class="text-line medium"></div>
                    </div>
                    <div class="feature-card-wireframe">
                        <div class="feature-icon-wireframe"></div>
                        <div class="title-line short" style="margin-bottom: 12px;"></div>
                        <div class="text-line full"></div>
                        <div class="text-line medium"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- секция "наша команда" с Swiper -->
        <section class="section" style="border-bottom: none;">
            <div class="container">
                <div class="title-line"></div>
                <div class="divider-line"></div>
                <div class="subtitle-line"></div>
                
                <div class="swiper team-swiper">
                    <div class="swiper-wrapper">
                        <div class="swiper-slide">
                            <div class="team-member-wireframe">
                                <div class="member-photo-wireframe">
                                    <div class="photo-lines">
                                        <div class="text-line full"></div>
                                        <div class="text-line medium"></div>
                                    </div>
                                </div>
                                <div class="member-name-line"></div>
                                <div class="member-role-line"></div>
                                <div class="text-line full"></div>
                                <div class="text-line medium"></div>
                            </div>
                        </div>
                        <div class="swiper-slide">
                            <div class="team-member-wireframe">
                                <div class="member-photo-wireframe">
                                    <div class="photo-lines">
                                        <div class="text-line full"></div>
                                        <div class="text-line medium"></div>
                                    </div>
                                </div>
                                <div class="member-name-line"></div>
                                <div class="member-role-line"></div>
                                <div class="text-line full"></div>
                                <div class="text-line medium"></div>
                            </div>
                        </div>
                        <div class="swiper-slide">
                            <div class="team-member-wireframe">
                                <div class="member-photo-wireframe">
                                    <div class="photo-lines">
                                        <div class="text-line full"></div>
                                        <div class="text-line medium"></div>
                                    </div>
                                </div>
                                <div class="member-name-line"></div>
                                <div class="member-role-line"></div>
                                <div class="text-line full"></div>
                                <div class="text-line medium"></div>
                            </div>
                        </div>
                        <div class="swiper-slide">
                            <div class="team-member-wireframe">
                                <div class="member-photo-wireframe">
                                    <div class="photo-lines">
                                        <div class="text-line full"></div>
                                        <div class="text-line medium"></div>
                                    </div>
                                </div>
                                <div class="member-name-line"></div>
                                <div class="member-role-line"></div>
                                <div class="text-line full"></div>
                                <div class="text-line medium"></div>
                            </div>
                        </div>
                    </div>
                    <div class="swiper-button-prev"></div>
                    <div class="swiper-button-next"></div>
                    <div class="swiper-pagination"></div>
                </div>
            </div>
        </section>

        <!-- контакты, обратная связь и карта -->
        <section class="section">
            <div class="container">
                <div class="contact-wireframe">
                    <div class="title-line medium"></div>
                    
                    <div class="info-item-wireframe">
                        <div class="info-icon-wireframe"></div>
                        <div class="info-content-wireframe">
                            <div class="info-label-wireframe"></div>
                            <div class="info-value-wireframe"></div>
                        </div>
                    </div>
                    <div class="info-item-wireframe">
                        <div class="info-icon-wireframe"></div>
                        <div class="info-content-wireframe">
                            <div class="info-label-wireframe"></div>
                            <div class="info-value-wireframe"></div>
                        </div>
                    </div>
                    <div class="info-item-wireframe">
                        <div class="info-icon-wireframe"></div>
                        <div class="info-content-wireframe">
                            <div class="info-label-wireframe"></div>
                            <div class="info-value-wireframe"></div>
                        </div>
                    </div>

                    <div class="title-line medium" style="margin-top: 32px;"></div>
                    
                    <div class="form-wireframe">
                        <input type="text">
                        <input type="tel">
                        <textarea></textarea>
                        <div class="btn-wireframe"></div>
                    </div>

                    <div class="map-wireframe">
                        <div class="map-lines">
                            <div class="text-line full"></div>
                            <div class="text-line long"></div>
                            <div class="text-line medium"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-logo-wireframe"></div>
            <div class="footer-line"></div>
            <div class="footer-line" style="width: 160px;"></div>
        </div>
    </footer>

    <div class="scroll-to-top-wireframe"></div>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const teamSwiper = new Swiper('.team-swiper', {
            slidesPerView: 'auto',
            centeredSlides: true,
            spaceBetween: 16,
            loop: true,
            autoplay: {
                delay: 3000,
                disableOnInteraction: false,
                pauseOnMouseEnter: true,
            },
            navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev',
            },
            pagination: {
                el: '.swiper-pagination',
                clickable: true,
            },
            breakpoints: {
                0: { centeredSlides: true, spaceBetween: 12 },
                380: { centeredSlides: true, spaceBetween: 16 },
                480: { centeredSlides: true, slidesPerView: 'auto', spaceBetween: 20 },
                768: { centeredSlides: false, slidesPerView: 2.2, spaceBetween: 24 },
                1024: { centeredSlides: false, slidesPerView: 3, spaceBetween: 24 }
            }
        });
    </script>
</body>
</html>
