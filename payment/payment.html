<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Оплата заказа | QuickDash</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="payment-container">
        <img class="logo-img" id="logo-img" src="./img/quickdash-logo-light.png" alt="QuickDash logo">
        <button id="theme-toggle" class="theme-toggle" aria-label="Переключить тему">
            <i class="fas fa-moon"></i>
        </button>
        
        <a href="../catalog/catalog.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Вернуться в каталог
        </a>
        <h1>Оформление заказа</h1>
        <p style="color: #666; transition: color 0.3s;" id="subtitle">Заполните данные для доставки</p>

        <div class="order-summary" id="order-summary">
            <div class="order-item">
                <span id="product-name">Загрузка...</span>
                <span id="product-price">0 ₽</span>
            </div>
            <div class="order-total">
                <span>Итого:</span>
                <span id="total-price">0 ₽</span>
            </div>
        </div>

        <form class="payment-form" id="payment-form">
            <input type="text" placeholder="Ваше имя" required>
            <input type="tel" placeholder="Номер телефона" required>
            <input type="text" placeholder="Адрес доставки" required>
            <button type="submit" class="pay-btn">Оплатить заказ</button>
        </form>
    </div>

    <script src="./main.js"></script>
    </body>
</html>
